name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Meson & Ninja
        run: pip install meson ninja

      - name: Install LLVM (Linux)
        if: runner.os == 'Linux'
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 20
          sudo apt-get install -y llvm-20-dev

      - name: Install LLVM (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install llvm@20
          echo "$(brew --prefix llvm@20)/bin" >> $GITHUB_PATH

      - name: Install LLVM (Windows)
        if: runner.os == 'Windows'
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "20"
 
      - name: Debug LLVM install (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "LLVM_PATH = $env:LLVM_PATH"
          Get-ChildItem "$env:LLVM_PATH\bin" | Where-Object { $_.Name -like "llvm*" }

      - name: Configure (release)
        run: meson setup build/ --buildtype=release

      - name: Build (release)
        run: meson compile -C build/

      - name: Smoke test
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            ./build/luma.exe --help || true
          else
            ./build/luma --help || true
          fi